services:
  postgres:
    image: postgres:18-alpine
    container_name: zamindar-plus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zamindar_plus
      POSTGRES_USER: zamindar
      POSTGRES_PASSWORD: zamindar_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: