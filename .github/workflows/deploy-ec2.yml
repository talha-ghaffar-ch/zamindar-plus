name: Deploy EC2 Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: deployment-secrets
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets are missing. Skipping EC2 deployment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/zamindar-plus-ec2.pem
          chmod 600 ~/.ssh/zamindar-plus-ec2.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Package release
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='dist' \
            --exclude='**/dist' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -czf /tmp/zamindar-plus-release.tgz .

      - name: Upload release to EC2
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: |
          scp -i ~/.ssh/zamindar-plus-ec2.pem /tmp/zamindar-plus-release.tgz "$EC2_USER@$EC2_HOST:/tmp/zamindar-plus-release.tgz"

      - name: Deploy on EC2
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/zamindar-plus-ec2.pem "$EC2_USER@$EC2_HOST" 'RELEASE_ARCHIVE=/tmp/zamindar-plus-release.tgz bash -s' < scripts/deploy-ec2-docker.sh
